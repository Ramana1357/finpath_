name: finpath
description: A student financial guide app

# Prevent accidental publishing
publish_to: 'none'

# App version
version: 1.0.0+1

# Dart SDK version
environment:
  sdk: ">=3.0.0 <4.0.0"

# ----------------------------
# 📦 Dependencies
# ----------------------------
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # 🔥 Charts (Pie + Bar charts)
  fl_chart: ^0.68.0

# ----------------------------
# 🛠 Dev Dependencies
# ----------------------------
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

# ----------------------------
# 🎨 Flutter Settings
# ----------------------------
flutter:
  uses-material-design: true

  # Assets and Fonts have been removed because the physical files were missing, 
  # which caused the build to fail.
